name: Merge on Approval

on:
  pull_request_review:
    types: [submitted]

jobs:
  merge-and-advance:
    if: |
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'dev'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Promote draft if needed, then merge
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          # Promote draft to ready if still a draft
          DRAFT=$(gh pr view $PR --repo $REPO --json isDraft --jq '.isDraft')
          if [ "$DRAFT" = "true" ]; then
            echo "PR is a draft — promoting to ready for review"
            gh pr ready $PR --repo $REPO
          fi

          echo "Merging PR #$PR"
          gh pr merge $PR --squash --delete-branch --repo $REPO


      - name: Close linked issue
        if: steps.merge.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          # Try Closes/Fixes/Resolves keywords in PR body first
          BODY=$(gh pr view $PR --repo $REPO --json body --jq '.body')
          ISSUES=$(echo "$BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | grep -oE '[0-9]+' || true)
          if [ -n "$ISSUES" ]; then
            for ISSUE in $ISSUES; do
              echo "Closing issue #$ISSUE (from PR body keyword)"
              gh issue close $ISSUE --repo $REPO || true
            done
          else
            # Fall back: close whichever open queue issue is assigned to Copilot
            echo "No Closes keyword found — closing Copilot-assigned issue from queue"
            gh issue list --repo $REPO --assignee "Copilot" --state open --json number --jq '.[].number' | while read ISSUE; do
              echo "Closing issue #$ISSUE (was assigned to Copilot)"
              gh issue close $ISSUE --repo $REPO || true
            done
          fi

      - name: Checkout dev (to read issue queue)
        if: steps.merge.conclusion == 'success'
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Find next open issue
        if: steps.merge.conclusion == 'success'
        id: find-next
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const queueData = JSON.parse(fs.readFileSync('.github/issue-queue.json', 'utf8'));
            const queue = queueData.queue;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 200,
            });

            const openNumbers = new Set(openIssues.map(i => i.number));
            const issueMap = Object.fromEntries(openIssues.map(i => [i.number, i]));

            for (const num of queue) {
              if (!openNumbers.has(num)) continue;
              const issue = issueMap[num];
              if (issue.assignees && issue.assignees.length > 0) continue;
              const isManual = issue.labels.some(l => l.name === 'manual');
              core.setOutput('issue_number', String(num));
              core.setOutput('is_manual', isManual ? 'true' : 'false');
              core.setOutput('found', 'true');
              console.log(`Next issue: #${num} (manual=${isManual})`);
              return;
            }

            core.setOutput('found', 'false');
            console.log('No more open issues in the queue — all done!');

      - name: Assign to Copilot
        if: steps.merge.conclusion == 'success' && steps.find-next.outputs.found == 'true' && steps.find-next.outputs.is_manual == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh issue edit ${{ steps.find-next.outputs.issue_number }} \
            --add-assignee @copilot \
            --repo ${{ github.repository }}
          echo "Assigned #${{ steps.find-next.outputs.issue_number }} to @copilot"

      - name: Assign to human
        if: steps.merge.conclusion == 'success' && steps.find-next.outputs.found == 'true' && steps.find-next.outputs.is_manual == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ steps.find-next.outputs.issue_number }} \
            --add-assignee benjaminfkile \
            --repo ${{ github.repository }}
          gh issue comment ${{ steps.find-next.outputs.issue_number }} \
            --body "👋 **Manual task** — this requires human action and cannot be completed by the coding agent. Complete the steps above, then close this issue to advance the queue." \
            --repo ${{ github.repository }}
          echo "Assigned manual #${{ steps.find-next.outputs.issue_number }} to benjaminfkile"
