name: Advance to Next Issue

on:
  pull_request:
    types: [closed]
    branches:
      - dev

jobs:
  next-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout (to read issue-queue.json)
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Advance to next open issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Load the ordered queue
            const queueData = JSON.parse(fs.readFileSync('.github/issue-queue.json', 'utf8'));
            const queue = queueData.queue;

            // Fetch all open issues in the repo (up to 200)
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 200,
            });

            const openNumbers = new Set(openIssues.map(i => i.number));
            const issueMap = Object.fromEntries(openIssues.map(i => [i.number, i]));

            // Walk the queue in order — find the first open, unassigned issue
            let next = null;
            for (const num of queue) {
              if (!openNumbers.has(num)) continue; // already closed/done
              const issue = issueMap[num];
              if (issue.assignees && issue.assignees.length > 0) continue; // already assigned
              next = issue;
              break;
            }

            if (!next) {
              console.log('🎉 No more open issues in the queue — all done!');
              return;
            }

            const isManual = next.labels.some(l => l.name === 'manual');

            if (isManual) {
              // Human task — assign to repo owner
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: next.number,
                assignees: ['benjaminfkile'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: next.number,
                body: '👋 **Manual task** — this issue requires human action and cannot be completed by the coding agent.\n\nPlease complete the steps described above, then close this issue to advance the queue.',
              });
              console.log(`Assigned manual task #${next.number} to benjaminfkile`);
            } else {
              // Code task — assign to Copilot
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: next.number,
                assignees: ['copilot'],
              });
              console.log(`Assigned #${next.number} to copilot`);
            }
