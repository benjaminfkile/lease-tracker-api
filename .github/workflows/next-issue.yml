name: Advance to Next Issue

# Manual fallback only — normal automation runs inside merge-on-approval.yml.
# Trigger this manually from Actions tab if the queue gets stuck.
on:
  workflow_dispatch:

jobs:
  next-issue:
    if: true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout (to read issue-queue.json)
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Find next open issue
        id: find-next
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const queueData = JSON.parse(fs.readFileSync('.github/issue-queue.json', 'utf8'));
            const queue = queueData.queue;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 200,
            });

            const openNumbers = new Set(openIssues.map(i => i.number));
            const issueMap = Object.fromEntries(openIssues.map(i => [i.number, i]));

            for (const num of queue) {
              if (!openNumbers.has(num)) continue;
              const issue = issueMap[num];
              if (issue.assignees && issue.assignees.length > 0) continue;
              const isManual = issue.labels.some(l => l.name === 'manual');
              core.setOutput('issue_number', String(num));
              core.setOutput('is_manual', isManual ? 'true' : 'false');
              core.setOutput('found', 'true');
              console.log(`Next issue: #${num} (manual=${isManual})`);
              return;
            }

            core.setOutput('found', 'false');
            console.log('No more open issues in the queue — all done!');

      - name: Assign to Copilot
        if: steps.find-next.outputs.found == 'true' && steps.find-next.outputs.is_manual == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ steps.find-next.outputs.issue_number }} \
            --add-assignee @copilot \
            --repo ${{ github.repository }}
          echo "Assigned #${{ steps.find-next.outputs.issue_number }} to @copilot"

      - name: Assign to human
        if: steps.find-next.outputs.found == 'true' && steps.find-next.outputs.is_manual == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ steps.find-next.outputs.issue_number }} \
            --add-assignee benjaminfkile \
            --repo ${{ github.repository }}
          gh issue comment ${{ steps.find-next.outputs.issue_number }} \
            --body "👋 **Manual task** — this requires human action and cannot be completed by the coding agent. Complete the steps above, then close this issue to advance the queue." \
            --repo ${{ github.repository }}
          echo "Assigned manual #${{ steps.find-next.outputs.issue_number }} to benjaminfkile"
